<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Student</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins', sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:
        linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1400&auto=format&fit=crop');
        background-size:cover;
        background-position:center;
    }

    .box{
        width:450px;
        background:rgba(255,255,255,0.12);
        backdrop-filter:blur(12px);
        padding:35px;
        border-radius:20px;
        border:1px solid rgba(255,255,255,0.2);
        box-shadow:0 15px 35px rgba(0,0,0,0.35);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
        color:white;
        font-size:30px;
    }

    input, select{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:none;
        border-radius:12px;
        outline:none;
        background:rgba(255,255,255,0.18);
        color:white;
        font-size:15px;
    }

    input::placeholder{
        color:#e2e8f0;
    }

    input:focus, select:focus{
        box-shadow:0 0 12px rgba(56,189,248,0.5);
        border:1px solid #38bdf8;
    }

    option{
        color:black;
    }

    button{
        width:100%;
        padding:14px;
        background:linear-gradient(135deg,#38bdf8,#2563eb);
        color:white;
        border:none;
        border-radius:12px;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
        margin-top:10px;
    }

    button:hover{
        transform:translateY(-3px);
        background:linear-gradient(135deg,#0ea5e9,#1d4ed8);
    }

</style>
</head>

<body>

<div class="box">

    <h2>Update Student</h2>

    <form method="POST">

        {% csrf_token %}

        <!-- USERNAME -->
        <input type="text"
               name="username"
               value="{{ student.user.username }}"
               required>

        <!-- EMAIL -->
        <input type="email"
               name="email"
               value="{{ student.user.email }}"
               required>

        <!-- COURSE -->
        <input type="text"
               name="course"
               value="{{ student.course }}"
               placeholder="Course"
               required>

        <!-- MARKS -->
        <input type="number"
               name="marks"
               value="{{ student.marks }}"
               placeholder="Marks"
               required>

        <!-- ATTENDANCE -->
        <input type="number"
               name="attendance"
               value="{{ student.attendance }}"
               placeholder="Attendance (%)">

        <button type="submit">
            Update Student
        </button>

    </form>

</div>

</body>
</html>
