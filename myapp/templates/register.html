<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.75)),
            url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1400&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
        }

        .container{
            width:400px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            padding:40px;
            border-radius:20px;
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 15px 35px rgba(0,0,0,0.35);
        }

        .container h2{
            text-align:center;
            margin-bottom:30px;
            color:white;
            font-size:32px;
            letter-spacing:1px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            font-size:15px;
            outline:none;
            background:rgba(255,255,255,0.18);
            color:white;
            transition:0.3s;
            border:1px solid transparent;
        }

        .input-box input::placeholder{
            color:#e2e8f0;
        }

        .input-box input:focus{
            border:1px solid #38bdf8;
            background:rgba(255,255,255,0.25);
            box-shadow:0 0 12px rgba(56,189,248,0.5);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            background:linear-gradient(135deg,#38bdf8,#2563eb);
            color:white;
            font-size:17px;
            font-weight:bold;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(37,99,235,0.4);
        }

        .btn:hover{
            transform:translateY(-3px);
            background:linear-gradient(135deg,#0ea5e9,#1d4ed8);
        }

        .error{
            color:#ffb4b4;
            text-align:center;
            margin-bottom:18px;
            font-size:14px;
            font-weight:bold;
        }

        .login-link{
            text-align:center;
            margin-top:22px;
            color:white;
            font-size:15px;
        }

        .login-link a{
            text-decoration:none;
            color:#38bdf8;
            font-weight:bold;
            transition:0.3s;
        }

        .login-link a:hover{
            color:#7dd3fc;
            text-decoration:underline;
        }

        @media(max-width:500px){

            .container{
                width:90%;
                padding:30px;
            }

            .container h2{
                font-size:26px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Create Account</h2>

        <p class="error">
            {% if error %}
                {{ error }}
            {% endif %}
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="input-box">
                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       required>
            </div>

            <div class="input-box">
                <input type="email"
                       name="email"
                       placeholder="Enter Email"
                       required>
            </div>

            <div class="input-box">
                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>
            </div>

            <button type="submit" class="btn">
                Register
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="/login/">Login</a>
        </div>

    </div>

</body>
</html>
