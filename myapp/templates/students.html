<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#38bdf8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

th{
    background:#38bdf8;
    color:black;
    padding:15px;
    font-size:16px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

.edit-btn{
    background:#22c55e;
    color:white;
    padding:8px 14px;
    text-decoration:none;
    border-radius:8px;
    margin-right:5px;
}

.delete-btn{
    background:#ef4444;
    color:white;
    padding:8px 14px;
    text-decoration:none;
    border-radius:8px;
}

.edit-btn:hover{
    background:#16a34a;
}

.delete-btn:hover{
    background:#dc2626;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 Students List</h1>

<table>

<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Course</th>
    <th>Marks</th>
    <th>Result</th>
    <th>Actions</th>
</tr>

{% for student in students %}

<tr>

    <td>{{ student.id }}</td>

    <td>{{ student.user.username }}</td>

    <td>{{ student.user.email }}</td>

    <td>{{ student.course }}</td>

    <td>{{ student.marks }}</td>

    <td>{{ student.result }}</td>

    <td>

        <a href="{% url 'update_student' student.id %}"
           class="edit-btn">
           Edit
        </a>

        <a href="{% url 'delete_student' student.id %}"
           class="delete-btn">
           Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
