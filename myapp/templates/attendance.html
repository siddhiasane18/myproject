<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance | Furtech Institute</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar{
    background:#020617;
    display:flex;
    justify-content:space-between;
    padding:18px 40px;
    align-items:center;
}

.logo{
    color:#38bdf8;
    font-size:26px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.nav-links a:hover{
    color:#38bdf8;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:1100px;
    margin:50px auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#38bdf8;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#38bdf8;
    color:black;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* STATUS */
.present{
    color:#22c55e;
    font-weight:bold;
}

.absent{
    color:#ef4444;
    font-weight:bold;
}

/* BUTTONS */
.btn{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin:3px;
}

.present-btn{
    background:#22c55e;
}

.absent-btn{
    background:#ef4444;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        🎓 Furtech Institute
    </div>

    <div class="nav-links">
        <a href="/dashboard/">Dashboard</a>
        <a href="/students/">Students</a>
        <a href="/logout/">Logout</a>
    </div>

</div>

<!-- CONTENT -->
<div class="container">

<h1>📅 Attendance (Login Users)</h1>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Course</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>

    <td>{{ student.id }}</td>

    <!-- ✅ FIXED -->
    <td>{{ student.user.username }}</td>

    <td>{{ student.course }}</td>

    <td id="status{{ student.id }}" class="present">
        Present
    </td>

    <td>

        <button class="btn present-btn"
                onclick="markPresent('{{ student.id }}')">
            Present
        </button>

        <button class="btn absent-btn"
                onclick="markAbsent('{{ student.id }}')">
            Absent
        </button>

    </td>

</tr>

{% endfor %}

</table>

</div>

<script>

function markPresent(id){
    document.getElementById("status"+id).innerHTML = "Present";
    document.getElementById("status"+id).className = "present";
}

function markAbsent(id){
    document.getElementById("status"+id).innerHTML = "Absent";
    document.getElementById("status"+id).className = "absent";
}

</script>

</body>
</html>
