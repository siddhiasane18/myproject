<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Notice Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* BODY */
body{
    background:#eef3f9;
}

/* NAVBAR */
.navbar{
    background:#0f172a;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#38bdf8;
    font-weight:bold;
    font-size:22px;
}

/* CONTAINER */
.container{
    padding:40px;
}

/* TITLE */
h1{
    color:#0f172a;
    margin-bottom:20px;
}

/* FORM */
.notice-form{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.notice-input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.notice-input:focus{
    border-color:#38bdf8;
    box-shadow:0 0 8px rgba(56,189,248,0.4);
}

/* BUTTON */
.add-btn{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.add-btn:hover{
    transform:translateY(-2px);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th{
    background:#38bdf8;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;
}

/* STATUS */
.active{
    color:green;
    font-weight:bold;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:20px;
    color:#666;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🎓 Furtech Institute</div>
</div>

<!-- CONTENT -->
<div class="container">

    <h1>📢 Notice Board</h1>

    <!-- ADD NOTICE FORM -->
    <form method="POST">
        {% csrf_token %}

        <div class="notice-form">

            <input type="text"
                   name="notice"
                   class="notice-input"
                   placeholder="Enter new notice..."
                   required>

            <button type="submit" class="add-btn">
                ➕ Add Notice
            </button>

        </div>
    </form>

    <!-- TABLE -->
    <table>

        <tr>
            <th>Notice</th>
            <th>Status</th>
        </tr>

        {% for n in notices %}

        <tr>
            <td>{{ n.notice }}</td>
            <td class="active">{{ n.status }}</td>
        </tr>

        {% empty %}

        <tr>
            <td colspan="2" class="empty">
                No notices available
            </td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
